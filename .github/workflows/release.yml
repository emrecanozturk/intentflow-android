name: Release Check

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  release-check:
    name: Release Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Full Check
        run: ./scripts/check.sh

      - name: Verify Changelog Mentions Version
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          if [[ "$VERSION" != "manual" ]]; then
            grep -q "$VERSION" CHANGELOG.md
          fi
